name: Build Firmware

on:
  workflow_call:
    inputs:
      device:
        description: Device keyname to build
        required: true
        type: string
      yggdrasil_dns:
        description: Space-separated DNS resolver addresses reachable over Yggdrasil
        required: false
        default: "324:71e:281a:9ed3::53 302:db60::53 202:1d4e:724e:de52:8273:e2b5:4988:a9ba"
        type: string
      default_root_password:
        description: Initial root password
        required: true
        default: yggmesh
        type: string
      yggdrasil_peers:
        description: Space-separated Yggdrasil peer URIs
        required: false
        type: string
      private_ssid:
        description: Client AP SSID for end-user devices
        required: false
        default: YggMesh
        type: string
  workflow_dispatch:
    inputs:
      device:
        description: Device keyname to build
        required: true
        type: choice
        options:
          - axt1800
          - mt3000
          - mt6000
          - ax53u
          - ar300m16
          - cpe710
          - ap3000outdoor
      yggdrasil_dns:
        description: Space-separated DNS resolver addresses reachable over Yggdrasil
        required: false
        default: "324:71e:281a:9ed3::53 302:db60::53 202:1d4e:724e:de52:8273:e2b5:4988:a9ba"
        type: string
      default_root_password:
        description: Initial root password
        required: true
        default: yggmesh
        type: string
      yggdrasil_peers:
        description: Space-separated Yggdrasil peer URIs
        required: false
        type: string
      private_ssid:
        description: Client AP SSID for end-user devices
        required: false
        default: YggMesh
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.device }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd wget python3

      - name: Build firmware
        env:
          YGGDRASIL_DNS: ${{ inputs.yggdrasil_dns }}
          DEFAULT_ROOT_PASSWORD: ${{ inputs.default_root_password }}
          YGGDRASIL_PEERS: ${{ inputs.yggdrasil_peers }}
          PRIVATE_SSID: ${{ inputs.private_ssid || 'YggMesh' }}
          MESH_ID: "yggmesh/mesh"
          MESH_KEY: "qJ7tN2vL8pR4xKcM"
          YGG_PORT: "17000"
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh "${{ inputs.device }}"

      - name: Resolve artifact name from output filename
        id: artifact-name
        run: |
          bin=$(ls output/*sysupgrade*.bin 2>/dev/null | head -1 || ls output/*.bin | head -1)
          echo "name=$(basename "$bin" .bin)" >> "$GITHUB_OUTPUT"

      - name: Upload device binaries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: output/*.bin
          if-no-files-found: error
